/* Mouse glow */
const mouseGlow = document.getElementById('mouse-glow');
document.addEventListener('mousemove', e => {
  mouseGlow.style.left = e.clientX + 'px';
  mouseGlow.style.top  = e.clientY + 'px';

/* ─── Canvas Setup ─── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#63b3ed','#b794f4','#f6ad55','#34d399','#f472b6'];

/* ─── Floating Particles ─── */
class Particle {
  constructor() { this.reset(true); }
  reset(init = false) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 10;
    this.r = Math.random() * 1.8 + 0.4;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.speed = Math.random() * 0.4 + 0.1;
    this.dx = (Math.random() - 0.5) * 0.3;
    this.alpha = 0;
    this.maxAlpha = Math.random() * 0.6 + 0.2;
    this.life = 0;
    this.maxLife = Math.random() * 400 + 200;
    this.twinkle = Math.random() * Math.PI * 2;
    this.twinkleSpeed = Math.random() * 0.03 + 0.01;
    this.fadeRate = Math.random() * 0.006 + 0.003;
  }
  update() {
    this.y -= this.speed;
    this.x += this.dx;
    this.life++;
    this.twinkle += this.twinkleSpeed;
    if (this.life < 60) this.alpha = Math.min(this.alpha + this.fadeRate, this.maxAlpha);
    else if (this.life > this.maxLife - 60) this.alpha = Math.max(this.alpha - this.fadeRate, 0);
    if (this.life > this.maxLife || this.y < -10) this.reset();
  }
  draw() {
    const pulse = 0.85 + 0.15 * Math.sin(this.twinkle);
    ctx.save();
    ctx.globalAlpha = this.alpha * pulse;
    ctx.shadowBlur = 6;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}
const particles = Array.from({length: 120}, () => new Particle());

/* ─── Shooting Stars ─── */
class ShootingStar {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W * 1.5 - W * 0.25;
    this.y = Math.random() * H * 0.5 - 50;
    this.len = Math.random() * 100 + 60;
    this.speed = Math.random() * 6 + 4;
    this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
    this.alpha = 0;
    this.active = false;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.timer = Math.random() * 300 + 60;
  }
  update() {
    if (!this.active) { this.timer--; if (this.timer <= 0) this.active = true; return; }
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    this.alpha = Math.min(this.alpha + 0.06, 1);
    if (this.x > W + 100 || this.y > H + 100) this.reset();
  }
  draw() {
    if (!this.active) return;
    const tx = this.x - Math.cos(this.angle) * this.len;
    const ty = this.y - Math.sin(this.angle) * this.len;
    const g = ctx.createLinearGradient(tx, ty, this.x, this.y);
    g.addColorStop(0, 'transparent');
    g.addColorStop(1, this.color);
    ctx.save();
    ctx.globalAlpha = this.alpha * 0.75;
    ctx.strokeStyle = g;
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 10;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(this.x, this.y);
    ctx.stroke();
    ctx.restore();
  }
}
const shootingStars = Array.from({length: 3}, () => new ShootingStar());

/* ─── Nebula blobs ─── */
const nebulae = Array.from({length: 5}, () => ({
  x: Math.random() * (typeof W !== 'undefined' ? W : 800),
  y: Math.random() * (typeof H !== 'undefined' ? H : 600),
  r: Math.random() * 160 + 80,
  color: COLORS[Math.floor(Math.random() * COLORS.length)],
  dx: (Math.random() - 0.5) * 0.15,
  dy: (Math.random() - 0.5) * 0.15,
  baseAlpha: Math.random() * 0.04 + 0.01,
  phase: Math.random() * Math.PI * 2,
  phaseSpeed: Math.random() * 0.005 + 0.002
}));

function drawNebulae() {
  nebulae.forEach(n => {
    n.x += n.dx; n.y += n.dy; n.phase += n.phaseSpeed;
    if (n.x < -n.r) n.x = W + n.r;
    if (n.x > W + n.r) n.x = -n.r;
    if (n.y < -n.r) n.y = H + n.r;
    if (n.y > H + n.r) n.y = -n.r;
    const a = n.baseAlpha * (0.8 + 0.2 * Math.sin(n.phase));
    const hex = Math.round(a * 255).toString(16).padStart(2,'0');
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    g.addColorStop(0, n.color + hex);
    g.addColorStop(1, 'transparent');
    ctx.save();
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

/* ─── Animate loop ─── */
function animate() {
  ctx.clearRect(0, 0, W, H);
  drawNebulae();
  particles.forEach(p => { p.update(); p.draw(); });
  shootingStars.forEach(s => { s.update(); s.draw(); });
  requestAnimationFrame(animate);
}
animate();

/* ─── Ripple ─── */
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 2;
    const ripple = document.createElement('span');
    ripple.classList.add('ripple');
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
});

/* ─── 3D tilt ─── */
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('mousemove', function(e) {
    const rect = this.getBoundingClientRect();
    const dx = (e.clientX - rect.left - rect.width  / 2) / rect.width;
    const dy = (e.clientY - rect.top  - rect.height / 2) / rect.height;
    this.style.transform = `translateY(-3px) rotateX(${-dy*4}deg) rotateY(${dx*4}deg)`;
  });
  card.addEventListener('mouseleave', function() { this.style.transform = ''; });
});
